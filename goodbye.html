<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Thank You</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>
    <a href="index.html" class="back-circle">
        ←
    </a>


    <section class="page">

        <h1 id="goodbyeName"></h1>

        <p>We'll miss you!</p>

        <p>Would you mind telling me why?</p>

        <textarea rows="6" cols="40" placeholder="Your reason (optional)..."></textarea>

        <br><br>

        <button onclick="submitReason()">
            Submit
        </button>

    </section>

    <script>

        const name = localStorage.getItem("guestName");

        document.getElementById("goodbyeName").innerHTML =
            "Thanks for letting me know, " + name + ".";

        function submitReason() {

            alert("Thank you! Hope to see you another time ❤️");

        }

    </script>

</body>

</html>
